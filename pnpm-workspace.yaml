packages:
  - 'packages/*'
allowBuilds:
  esbuild: true
  sharp: true
minimumReleaseAgeExclude:
  - '@astrojs/rss@4.0.19'
overrides:
  mermaid: '>=11.15.0'
  devalue: '>=5.8.1'
  yaml: '>=2.8.3'
  # Security overrides for transitive deps (GHSA advisories).
  # Pinned within their existing major to avoid pulling unintended majors.
  undici: '>=7.28.0 <8'
  dompurify: '>=3.4.11 <4'
  '@babel/core': '>=7.29.6 <8'
  'js-yaml@3': '>=3.15.0 <4'
  'js-yaml@4': '>=4.2.0 <5'
