<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#09090b"/>
  <!-- Centred: Y range 8–24, centre ≈16 -->
  <g stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Flat elliptical arch (ry=5, wide/low — not a dome) -->
    <path d="M7 13a9 5 0 0 1 18 0"/>
    <!-- Left pillar -->
    <line x1="7" y1="13" x2="7" y2="24"/>
    <!-- Right pillar -->
    <line x1="25" y1="13" x2="25" y2="24"/>
    <!-- H crossbar -->
    <line x1="7" y1="19" x2="25" y2="19"/>
    <!-- Base flush with pillars -->
    <line x1="7" y1="24" x2="25" y2="24"/>
  </g>
</svg>
