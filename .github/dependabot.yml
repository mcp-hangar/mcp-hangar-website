# Dependabot version-updates. pnpm workspace: the root manifest + lockfile
# covers all workspace packages, so a separate /packages/site npm entry only
# produced duplicate PRs (see #79/#81) and was removed.
version: 2
updates:
- package-ecosystem: npm
  directory: /
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 10
  commit-message:
    prefix: chore
    include: scope
  cooldown:
    default-days: 7
  groups:
    root-minor-patch:
      update-types:
      - minor
      - patch
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
  open-pull-requests-limit: 5
  commit-message:
    prefix: ci
    include: scope
  groups:
    github-actions:
      update-types:
      - minor
      - patch
