name: Rebuild on Docs Update

# Bumps the @mcp-hangar/docs lockfile entry to the latest docs commit and
# pushes, which triggers a Vercel rebuild with the new docs. A plain empty
# commit is NOT enough: pnpm-lock.yaml pins the docs tarball to a specific
# commit, so without updating the lockfile the rebuild ships stale docs.
#
# Trigger from the main mcp-hangar repo on docs changes:
#
#   - name: Trigger website rebuild
#     uses: peter-evans/repository-dispatch@v2
#     with:
#       token: ${{ secrets.WEBSITE_REPO_TOKEN }}
#       repository: mapyr/mcp-hangar-website
#       event-type: docs-updated

on:
  repository_dispatch:
    types: [docs-updated]

  # Daily rebuild to catch docs changes
  schedule:
    - cron: '0 4 * * *'

  workflow_dispatch:

jobs:
  bump-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Use Node.js 22
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Bump @mcp-hangar/docs to latest commit
        run: pnpm --filter site update @mcp-hangar/docs

      - name: Commit and push if docs changed
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Docs already up to date — nothing to rebuild."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: bump docs to latest [skip ci]"
          git push
